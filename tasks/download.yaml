---

- name: merge algernon configuration between defaults and custom
  ansible.builtin.set_fact:
    algernon_config: "{{ algernon_defaults_config | combine(algernon_config, recursive=True) }}"

- name: get latest release
  when:
    - not running_in_check_mode
    - algernon_version == "latest"
  delegate_to: localhost
  become: false
  run_once: true
  block:
    - name: get latest release
      delegate_to: localhost
      become: false
      run_once: true
      bodsch.scm.github_latest:
        project: xyproto
        repository: algernon
        user: "{{ lookup('env', 'GH_USER') | default(omit) }}"
        password: "{{ lookup('env', 'GH_TOKEN') | default(omit) }}"
        filter_elements:
          - TLS
          - win8
          - rpi3
          - static
        # github_tags: true
      register: _latest_release

    - name: re-define algernon_version
      ansible.builtin.set_fact:
        algernon_version: "{{ _latest_release.latest_release }}"

- name: re-define archive name for 1.12.x
  ansible.builtin.set_fact:
    algernon_archive_name: algernon-{{ algernon_version }}-linux_static.tar.xz
    algernon_remote_version: "{{ algernon_version }}"
  when:
    - algernon_version_minor | int == 12
    - algernon_version_patch | int > 10

- name: re-define archive name for 1.13.x
  ansible.builtin.set_fact:
    algernon_archive_name: algernon-{{ algernon_version }}-linux_{{ ansible_facts.architecture }}_static.tar.xz
    algernon_remote_version: "v{{ algernon_version }}"
  when:
    - algernon_version_minor | int >= 13

- name: define delegate instance for download handling
  when:
    - not running_in_check_mode
    - algernon_direct_download
  delegate_to: localhost
  run_once: "{{ 'true' if not algernon_direct_download else 'false' }}"
  ansible.builtin.set_fact:
    algernon_delegate_to: "{{ ansible_facts.host }}"
    algernon_local_tmp_directory: "{{
        lookup('env', 'CUSTOM_LOCAL_TMP_DIRECTORY') |
        default('/var/cache/ansible/algernon', true) }}/{{ algernon_version }}"

- name: create download directory
  when:
    - not running_in_check_mode
  become: false
  delegate_to: "{{ algernon_delegate_to }}"
  ansible.builtin.file:
    path: "{{ algernon_local_tmp_directory }}"
    state: directory
    mode: "0750"
  run_once: "{{ 'true' if not algernon_direct_download else 'false' }}"

- name: download algernon archive
  when:
    - not running_in_check_mode
  become: false
  delegate_to: "{{ algernon_delegate_to }}"
  ansible.builtin.get_url:
    url: "https://github.com/xyproto/algernon/releases/download/{{ algernon_remote_version }}/{{ algernon_archive_name }}"
    dest: "{{ algernon_local_tmp_directory }}/algernon-{{ algernon_version }}-linux.tar.xz"
    mode: "0600"
  register: _download_archive
  until: _download_archive is succeeded
  retries: 5
  delay: 2
  check_mode: false

- name: detect extracted binary
  when:
    - not running_in_check_mode
  become: false
  delegate_to: "{{ algernon_delegate_to }}"
  run_once: "{{ 'false' if algernon_direct_download else 'true' }}"
  ansible.builtin.stat:
    path: "{{ algernon_local_tmp_directory }}/algernon"
  register: stat_algernon_binary

- name: extract algernon archive
  when:
    - not running_in_check_mode
    - stat_algernon_binary.stat is defined
    - not stat_algernon_binary.stat.exists | default('false')
  become: false
  delegate_to: "{{ algernon_delegate_to }}"
  ansible.builtin.unarchive:
    src: "{{ algernon_local_tmp_directory }}/algernon-{{ algernon_version }}-linux.tar.xz"
    dest: "{{ algernon_local_tmp_directory }}"
    copy: false
    extra_opts:
      - --strip-components=1
  register: _extract_archive

...
